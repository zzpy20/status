name = "status"
main = "src/index.js"
compatibility_date = "2026-07-08"

[[d1_databases]]
binding = "DB"
database_name = "status-uptime"
database_id = "335be636-85e7-4ce9-8fd7-69df73a011f0"

[triggers]
crons = ["*/1 * * * *"]

[[routes]]
pattern = "status.1000600.xyz"
custom_domain = true

[vars]
# Used to build the "View monitor" link in notification emails. Not
# sensitive -- it's the same hostname already public in [[routes]] above.
PUBLIC_BASE_URL = "https://status.1000600.xyz"

# TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, RESEND_API_KEY, and OWNER_EMAIL are
# all Workers secrets (`wrangler secret put`), not plaintext vars here -- the
# tokens grant send access, and the chat ID/email address are personal
# identifiers, neither belongs in this public repo. See README.
