name = "status"
main = "src/index.js"
compatibility_date = "2026-07-08"

[[d1_databases]]
binding = "DB"
database_name = "status-uptime"
database_id = "335be636-85e7-4ce9-8fd7-69df73a011f0"

[triggers]
crons = ["*/1 * * * *"]

[[routes]]
pattern = "status.1000600.xyz"
custom_domain = true

# TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are both Workers secrets (`wrangler
# secret put`), not plaintext vars here -- the bot token grants send access,
# and the chat ID is a personal identifier neither belongs in this public
# repo. See README.
