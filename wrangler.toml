name = "status"
main = "src/index.js"
compatibility_date = "2026-07-08"

[[d1_databases]]
binding = "DB"
database_name = "status-uptime"
database_id = "335be636-85e7-4ce9-8fd7-69df73a011f0"

[triggers]
crons = ["*/1 * * * *"]

[[routes]]
pattern = "status.1000600.xyz"
custom_domain = true

[vars]
# Used to build the "View monitor" link in notification emails. Not
# sensitive -- it's the same hostname already public in [[routes]] above.
PUBLIC_BASE_URL = "https://status.1000600.xyz"

# dns-drift-sync.js config -- identifiers only, not credentials (same
# reasoning as CF_ZONE_ID being a plain var in Shenzhen-Reality). Merged in
# here (rather than its own Worker) because the Cloudflare account is
# already at the 5-cron-trigger limit -- see Shenzhen-Reality/README.md.
CF_ZONE_ID = "55a63d71052ea69b58411d1a128944e8"
SZ_HOSTNAME = "shenzhen.1000600.xyz"
SZ_REGION = "cn-shenzhen"
SZ_INSTANCE_ID = "i-wz99bfloouzyb5fdaefu"
SG_HOSTNAME = "singapore.1000600.xyz"
SG_REGION = "ap-southeast-1"
SG_INSTANCE_ID = "i-t4nf6p5wwxfqp7qorusk"

# TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, RESEND_API_KEY, OWNER_EMAIL,
# ALIYUN_ACCESS_KEY_ID, ALIYUN_ACCESS_KEY_SECRET, and CF_API_TOKEN are all
# Workers secrets (`wrangler secret put`), not plaintext vars here -- these
# grant send/API access, none belong in this public repo. See README.
